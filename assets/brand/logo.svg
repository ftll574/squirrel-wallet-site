<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="Squirrel Wallet logo">
  <title>Squirrel Wallet</title>
  <!-- Bushy tail — flowing stroke behind the body -->
  <path d="M20 52 Q4 42 8 22 Q14 6 32 8 Q44 10 44 22 Q44 30 36 30 Q30 30 30 24 Q30 20 34 20"
        fill="none"
        stroke="currentColor"
        stroke-width="7"
        stroke-linecap="round"
        stroke-linejoin="round"/>
  <!-- Body -->
  <ellipse cx="36" cy="44" rx="12" ry="14" fill="currentColor"/>
  <!-- Belly highlight -->
  <ellipse cx="34" cy="50" rx="6" ry="7" fill="#FFFFFF" fill-opacity="0.22"/>
  <!-- Head -->
  <circle cx="46" cy="28" r="10" fill="currentColor"/>
  <!-- Ear -->
  <path d="M42 19 L44 11 L50 17 Z" fill="currentColor"/>
  <!-- Eye -->
  <circle cx="49" cy="27" r="1.9" fill="#FFFFFF"/>
  <circle cx="49.5" cy="27" r="0.7" fill="currentColor"/>
  <!-- Nose -->
  <circle cx="55" cy="30" r="1.2" fill="#FFFFFF" fill-opacity="0.55"/>
</svg>
